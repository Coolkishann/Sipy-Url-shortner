server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Static Assets — Ensure Vite's built assets are served locally
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # API & Health Checks — Target the local LOAD BALANCER
    location /api/ {
        proxy_pass http://load-balancer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://load-balancer:8080;
        proxy_set_header Host $host;
    }

    # Short Link Redirect — Target the local LOAD BALANCER
    location / {
        # Check if requested file exists (like index.html or other static files in root)
        try_files $uri $uri/ @api_redirect;
    }

    # Redirect short IDs to the load balancer
    location @api_redirect {
        proxy_pass http://load-balancer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}