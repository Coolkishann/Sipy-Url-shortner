server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # DNS Resolver for cloud destinations
    resolver 8.8.8.8;

    # Dashboard
    location = / {
        try_files /index.html =404;
    }

    # API & Health Checks
    location /api/ {
        proxy_pass https://sipy-url-shortner-1.onrender.com;
        proxy_set_header Host sipy-url-shortner-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass https://sipy-url-shortner-1.onrender.com;
        proxy_set_header Host sipy-url-shortner-1.onrender.com;
    }

    # Static Assets
    location /styles/ {
        try_files $uri =404;
    }
    
    location /scripts/ {
        try_files $uri =404;
    }
    
    location /favicon.ico {
        try_files $uri =404;
    }

    # Short Link Redirect
    # Anything else (like /w0o2M41) goes to the API to be redirected
    location / {
        proxy_pass https://sipy-url-shortner-1.onrender.com;
        proxy_set_header Host sipy-url-shortner-1.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}