server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets from the /assets directory (Vite default build output)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Serve files from /styles and /scripts if they exist (Legacy or dev fallback)
    location /styles/ {
        try_files $uri =404;
    }
    
    location /scripts/ {
        try_files $uri =404;
    }

    location /favicon.ico {
        try_files $uri =404;
    }

    # API & Health Checks
    location /api/ {
        proxy_pass https://sipy-url-shortner.onrender.com;
        proxy_set_header Host sipy-url-shortner.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass https://sipy-url-shortner.onrender.com;
        proxy_set_header Host sipy-url-shortner.onrender.com;
    }

    # Default location for the frontend
    location / {
        proxy_pass https://sipy-url-shortner.onrender.com;
        proxy_set_header Host sipy-url-shortner.onrender.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Handle 404s by falling back to index.html (useful for SPA behavior)
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}