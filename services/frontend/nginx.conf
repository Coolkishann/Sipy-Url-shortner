server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 1. Dashboard (The Root)
    location = / {
        try_files /index.html =404;
    }

    # 2. API & Health Checks
    location /api/ {
        proxy_pass http://load-balancer:8080;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://load-balancer:8080;
        proxy_set_header Host $host;
    }

    # 3. Static Assets
    location /styles/ {
        try_files $uri =404;
    }
    
    location /scripts/ {
        try_files $uri =404;
    }
    
    location /favicon.ico {
        try_files $uri =404;
    }

    # 4. Short Link Redirection
    # This proxies everything else to the API server for redirection.
    # If the API returns 404, we fallback to the frontend dashboard.
    location / {
        proxy_pass http://load-balancer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
