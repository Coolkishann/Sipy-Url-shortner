server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # DNS Resolver for cloud destinations
    resolver 8.8.8.8 valid=30s;

    # Dashboard
    location = / {
        try_files /index.html =404;
    }

    # API & Health Checks
    location /api/ {
        proxy_pass https://sipy-url-shortner.onrender.com;
        proxy_set_header Host sipy-url-shortner.onrender.com;
        
        # Crucial for proxying to SSL services like Render
        proxy_ssl_server_name on;
        proxy_ssl_name sipy-url-shortner.onrender.com;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for slower cold-starts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass https://sipy-url-shortner.onrender.com;
        proxy_set_header Host sipy-url-shortner.onrender.com;
        proxy_ssl_server_name on;
    }

    # Static Assets
    location /styles/ {
        try_files $uri =404;
    }
    
    location /scripts/ {
        try_files $uri =404;
    }
    
    location /favicon.ico {
        try_files $uri =404;
    }

    # Short Link Redirect
    location / {
        # Treat root dash correctly
        if ($request_uri = "/") {
            rewrite ^ / break;
        }

        proxy_pass https://sipy-url-shortner.onrender.com;
        proxy_set_header Host sipy-url-shortner.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_name sipy-url-shortner.onrender.com;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}